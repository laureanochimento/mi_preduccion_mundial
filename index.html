            padding: 20px; text-align: center;

        }

        .version-tag { color: var(--text-dim); font-size: 0.9rem; margin-top: 4px; }

            display: flex; justify-content: center; background: #0f172a;
            padding: 10px; gap: 8px; overflow-x: auto;
            border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100;
        }
        .nav-btn {
            background: #1e293b; color: var(--text-dim); border: none;
            padding: 10px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; white-space: nowrap; transition: 0.2s;
        }
        .nav-btn.active { background: var(--rose); color: white; }
        
        .main-container {
            flex-grow: 1; max-width: 1700px; margin: 0 auto; padding: 20px; width: 95%;
        }
        .scenarios-layout {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px;
        }
        .sc-col {
            background: var(--bg-card); border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); border-top: 5px solid #475569;
        }
        .sc-col.sc1 { border-color: var(--blue-sc); }
        .sc-col.sc2 { border-color: var(--amber-sc); }
        .sc-col.sc3 { border-color: var(--emerald-sc); }
        
        .sc-header { text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #1e293b; }
        .sc-header h2 { margin: 0; font-size: 1.2rem; }
        .sc-meta { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; margin-top: 4px; background: rgba(0,0,0,0.2); }
        
        .standing-panel { background: #020617; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; line-height: 1.4; border-left: 4px solid var(--rose); }
        .standing-title { font-weight: bold; color: #e2e8f0; margin-bottom: 4px; text-transform: uppercase; font-size: 0.75rem; }
        
        .match-box {
            background: var(--bg-match); border-radius: 8px; padding: 12px; margin-bottom: 10px;
            border-left: 3px solid #475569; transition: 0.15s;
        }
        .match-box.is-changed { border-left-color: var(--rose); background: #221c2e; }
        .match-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
        .match-teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.95rem; margin-bottom: 6px; color: #fff; }
        .match-desc { font-size: 0.8rem; color: #cbd5e1; font-style: italic; line-height: 1.3; background: rgba(0,0,0,0.15); padding: 6px; border-radius: 4px; }
        
        .cert-val { font-weight: bold; color: var(--amber-sc); }
        .changed-label { background: var(--rose); color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }

    function runEngine() {
        const bar = document.getElementById('fasesTabs');
        let active = true;

        for (const [key, val] of Object.entries(dbMundial)) {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${active ? 'active' : ''}`;
            btn.innerText = val.name;
            btn.onclick = () => renderView(key, btn);
            bar.appendChild(btn);
            if (active) {
                renderView(key, btn);
                active = false;
            }
        }
    }

    function renderView(key, button) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        button.classList.add('active');

        const layout = document.getElementById('renderZone');
        layout.innerHTML = '';

        const data = dbMundial[key];
        const baseMatches = data.sc1.matches;

        ['sc1', 'sc2', 'sc3'].forEach(scKey => {
            const config = scConfig[scKey];
            const scData = data[scKey];

            const col = document.createElement('div');
            col.className = `sc-col ${config.class}`;

            let listHTML = '';

            baseMatches.forEach((baseMatch, idx) => {
                let currentTeams = baseMatch.teams;
                let currentJust = baseMatch.j;
                let isChanged = false;

                if (scKey !== 'sc1' && scData && scData.matches && scData.matches[idx]) {
                    currentTeams = scData.matches[idx].teams;
                    currentJust = scData.matches[idx].j;
                    isChanged = true;
                }

                listHTML += `
                    <div class="match-box ${isChanged ? 'is-changed' : ''}">
                        <div class="match-header">
                            <span>Partido ${idx + 1}</span>
                            ${isChanged ? '<span class="changed-label">Alterado</span>' : `<span>Certeza: <span class="cert-val">${baseMatch.cert || '60%'}</span></span>`}
                        </div>
                        <div class="match-teams">${currentTeams}</div>
                        <div class="match-desc">${currentJust}</div>
                    </div>
                `;
            });

            col.innerHTML = `
                <div class="sc-header">
                    <h2>${config.title}</h2>
                    <span class="sc-meta">${config.meta}</span>
                </div>
                <div class="standing-panel">
                    <div class="standing-title">Proyección Estructural</div>
                    ${scData && scData.standings ? scData.standings : (data.sc1.standings)}
                </div>
                ${listHTML}
            `;
            layout.appendChild(col);
        });
    }

    window.onload = runEngine;
</script>
