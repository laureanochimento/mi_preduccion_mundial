        :root {
            --bg-deep: #030712;

            --text-dim: #94a3b8;
            --rose: #e11d48;
            --blue-sc: #3b82f6;
            --amber-sc: #f59e0b;
            --emerald-sc: #10b981;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        header {
            background-color: #000;
            padding: 25px 20px; text-align: center;
            border-bottom: 3px solid var(--rose);
        }
        h1 { margin: 0; font-size: 2rem; letter-spacing: 0.5px; }
        .version-tag { color: var(--text-dim); font-size: 0.9rem; margin-top: 6px; }
        
        .nav-bar {
            display: flex; justify-content: center; background: #0b0f19;
            padding: 12px; gap: 8px; overflow-x: auto;
            border-bottom: 1px solid #1e293b; sticky: top; top: 0; z-index: 100;
        }
        .nav-btn {
            background: #1e293b; color: var(--text-dim); border: none;
            padding: 10px 18px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; white-space: nowrap; transition: 0.2s;
        }
        .nav-btn.active { background: var(--rose); color: white; }
        
        .main-container {
            flex-grow: 1; max-width: 1700px; margin: 0 auto; padding: 25px; width: 95%;
        }
        .scenarios-layout {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px;
        }
        .sc-col {
            background: var(--bg-card); border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); border-top: 5px solid #475569;
        }
        .sc-col.sc1 { border-color: var(--blue-sc); }
        .sc-col.sc2 { border-color: var(--amber-sc); }
        .sc-col.sc3 { border-color: var(--emerald-sc); }
        
        .sc-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #1e293b; }
        .sc-header h2 { margin: 0; font-size: 1.3rem; }
        .sc-meta { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; margin-top: 6px; background: rgba(0,0,0,0.3); }
        
        .standing-panel { background: #020617; padding: 14px; border-radius: 8px; margin-bottom: 20px; font-size: 0.88rem; line-height: 1.5; border-left: 4px solid var(--rose); }
        .standing-title { font-weight: bold; color: #e2e8f0; margin-bottom: 6px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        
        .match-box {
            background: var(--bg-match); border-radius: 8px; padding: 14px; margin-bottom: 14px;
            border-left: 3px solid #475569; transition: transform 0.15s ease;
        }
        .match-box:hover { transform: translateY(-2px); }
        .match-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
        .match-teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.05rem; margin-bottom: 8px; color: #fff; }
        .match-desc { font-size: 0.85rem; color: #cbd5e1; font-style: italic; line-height: 1.4; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 5px; border-top: 1px solid rgba(255,255,255,0.03); }
        .cert-val { font-weight: bold; }
        .sc1 .cert-val { color: var(--blue-sc); }
        .sc2 .cert-val { color: var(--amber-sc); }
        .sc3 .cert-val { color: var(--emerald-sc); }
        
        .phase-summary { text-align: center; background: linear-gradient(135deg, #1e1b4b, #030712); padding: 20px; border-radius: 8px; border: 2px dashed gold; margin-top: 15px; font-weight: 600; }

    // MOTOR DE CONTROL DE LA INTERFAZ DINÁMICA
    function runCore() {
        const tabsBox = document.getElementById('fasesTabs');
        let isFirst = true;

        for (const [key, phase] of Object.entries(dbMundial)) {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${isFirst ? 'active' : ''}`;
            btn.innerText = phase.name;
            btn.onclick = () => drawPhase(key, btn);
            tabsBox.appendChild(btn);
            if (isFirst) {
                drawPhase(key, btn);
                isFirst = false;
            }
        }
    }

    function drawPhase(phaseKey, element) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');

        const view = document.getElementById('renderZone');
        view.innerHTML = ''; 

        const data = dbMundial[phaseKey];

        ['sc1', 'sc2', 'sc3'].forEach(scKey => {
            const info = scConfig[scKey];
            const scData = data[scKey];

            const col = document.createElement('div');
            col.className = `sc-col ${info.class}`;

            let mHTML = '';
            if (scData && scData.matches) {
                scData.matches.forEach(m => {
                    mHTML += `
                        <div class="match-box">
                            <div class="match-header"><span>Certeza Analítica</span> <span class="cert-val">${m.cert}</span></div>
                            <div class="match-teams">${m.teams}</div>
                            <div class="match-desc">${m.j}</div>
                        </div>
                    `;
                });
            } else {
                mHTML = `<p style="color: var(--text-dim); text-align: center; padding: 20px;">Los cruces se mantienen idénticos al modelo base en esta instancia.</p>`;
            }

            col.innerHTML = `
                <div class="sc-header">
                    <h2>${info.title}</h2>
                    <span class="sc-meta">${info.meta}</span>
                </div>
                <div class="standing-panel">
                    <div class="standing-title">Desenlace de la Fase</div>
                    ${scData ? scData.standings : 'Aún sin cargar.'}
                </div>
                ${mHTML}
            `;
            view.appendChild(col);
        });
    }

    window.onload = runCore;
</script>
