            border-bottom: 3px solid var(--accent);
        }
        h1 { margin: 0; font-size: 1.8rem; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; }
        
        /* Navigation Tabs */
        .nav-container {
            display: flex; justify-content: center; background: #0f172a;
            padding: 10px; gap: 10px; overflow-x: auto;
            border-bottom: 1px solid #1e293b;
        }
        .nav-btn {
            background: #1e293b; color: var(--text-muted); border: none;
            padding: 10px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 600; white-space: nowrap; transition: 0.2s;
        }
        .nav-btn.active { background: var(--accent); color: white; }
        
        .container {
            flex-grow: 1; max-width: 1600px; margin: 0 auto; padding: 20px; width: 95%;
        }

        /* Grid System for 3 Scenarios */
        .scenarios-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;
        }
        
        .column {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            border-top: 5px solid #334155;
        }
        .column.sc1 { border-color: var(--sc1); }
        .column.sc2 { border-color: var(--sc2); }
        .column.sc3 { border-color: var(--sc3); }
        
        .col-header { text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #1e293b; }
        .col-header h2 { margin: 0; font-size: 1.3rem; }
        .probability { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; margin-top: 5px; background: rgba(0,0,0,0.2); }
        
        /* Table Standings style */
        .standings-box { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; border-left: 4px solid var(--accent); }
        .standings-title { font-weight: bold; margin-bottom: 5px; color: #cbd5e1; }
        
        /* Matches style */
        .match-card {
            background: var(--match-bg); border-radius: 8px; padding: 12px; margin-bottom: 12px;
            border-left: 3px solid #475569;
        }
        .match-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        .match-teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; margin-bottom: 6px; }
        .match-just { font-size: 0.85rem; color: #cbd5e1; font-style: italic; line-height: 1.3; background: rgba(0,0,0,0.15); padding: 6px; border-radius: 4px; }
        .cert-badge { color: #f59e0b; font-weight: bold; }
        
        .champion-banner {
            text-align: center; background: linear-gradient(135deg, #1e1b4b, #311042);
            padding: 15px; border-radius: 8px; border: 2px solid gold; margin-top: 15px;
        }

</head>

    // MOTOR DE RENDERIZADO DEL DASHBOARD INTERACTIVO
    function initDashboard() {
        const navContainer = document.getElementById('navTabs');
        let initial = true;

        for (const [key, phase] of Object.entries(phasesData)) {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${initial ? 'active' : ''}`;
            btn.innerText = phase.name;
            btn.onclick = () => renderPhase(key, btn);
            navContainer.appendChild(btn);
            if (initial) {
                renderPhase(key, btn);
                initial = false;
            }
        }
    }

    function renderPhase(phaseKey, clickedBtn) {
        // Manejo de clases activas en botones de navegación
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        clickedBtn.classList.add('active');

        const grid = document.getElementById('contentGrid');
        grid.innerHTML = ''; // Limpiar pantalla

        const phase = phasesData[phaseKey];

        // Crear columnas para cada uno de los 3 escenarios en paralelo
        ['sc1', 'sc2', 'sc3'].forEach(scKey => {
            const scInfo = config[scKey];
            const scPhaseData = phase[scKey];

            const col = document.createElement('div');
            col.className = `column ${scInfo.class}`;

            let matchesHTML = '';
            if (scPhaseData && scPhaseData.matches && scPhaseData.matches.length > 0) {
                scPhaseData.matches.forEach(m => {
                    matchesHTML += `
                        <div class="match-card">
                            <div class="match-meta"><span>Predicción Oficial</span> <span class="cert-badge">Certeza: ${m.c}</span></div>
                            <div class="match-teams">${m.t}</div>
                            <div class="match-just">${m.j}</div>
                        </div>
                    `;
                });
            } else {
                matchesHTML = `<p style="color: var(--text-muted); font-style: italic; text-align: center; padding: 20px;">Los resultados se mantienen idénticos a la matriz lógica en esta fase.</p>`;
            }

            col.innerHTML = `
                <div class="col-header">
                    <h2>${scInfo.name}</h2>
                    <span class="probability">Factibilidad: ${scInfo.prob}</span>
                </div>
                <div class="standings-box">
                    ${scPhaseData ? scPhaseData.standings : 'Sin alteraciones estructurales.'}
                </div>
                ${matchesHTML}
            `;
            grid.appendChild(col);
        });
    }

    window.onload = initDashboard;
